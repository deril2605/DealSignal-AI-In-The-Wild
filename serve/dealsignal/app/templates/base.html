<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealSignal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --ink: #102030;
      --muted: #5b6877;
      --brand: #0b3f66;
      --brand-2: #1877c9;
      --card: #ffffff;
      --line: #e7edf4;
      --good: #0d8f55;
      --chip: #ebf4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% -5%, #d6e9ff 0, transparent 45%),
        radial-gradient(circle at 85% -10%, #d9f8ef 0, transparent 40%),
        var(--bg);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      background: linear-gradient(90deg, rgba(11, 63, 102, 0.9), rgba(24, 119, 201, 0.86));
    }
    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    nav {
      display: flex;
      gap: 10px;
    }
    nav a {
      color: #eaf5ff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 8px 12px;
      border-radius: 999px;
      transition: background-color 0.2s ease;
    }
    nav a:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    .container {
      max-width: 1120px;
      margin: 24px auto;
      padding: 0 16px 30px;
      animation: fade-up 0.35s ease-out;
    }
    .hero {
      margin-bottom: 16px;
      padding: 16px 18px;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, #0e4a75 0%, #1262a4 48%, #179d8a 100%);
      box-shadow: 0 10px 24px rgba(16, 55, 84, 0.2);
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .hero p {
      margin: 0;
      opacity: 0.95;
      font-size: 0.92rem;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      box-shadow: 0 3px 12px rgba(14, 47, 75, 0.06);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--chip);
      color: #0d3a5d;
      border: 1px solid #cfe4ff;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .score {
      background: #e6fbf2;
      color: var(--good);
      border: 1px solid #bbefda;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.84rem;
      white-space: nowrap;
    }
    .muted { color: var(--muted); font-size: 0.88rem; }
    .summary { margin: 10px 0; line-height: 1.5; font-size: 0.94rem; }
    .actions a {
      text-decoration: none;
      color: #0e5ea6;
      font-weight: 700;
      font-size: 0.88rem;
    }
    select, button {
      border: 1px solid #cdd8e5;
      border-radius: 10px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.88rem;
      background: #fff;
      color: var(--ink);
    }
    button {
      background: #0d4d7b;
      border-color: #0d4d7b;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: #0b3f66;
    }
    .filter-list {
      max-height: 220px;
      overflow: auto;
      border: 1px solid #dce5ef;
      border-radius: 10px;
      background: #fbfdff;
      padding: 6px 8px;
      margin-top: 6px;
      margin-bottom: 10px;
    }
    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.88rem;
    }
    .filter-item input[type="checkbox"] {
      accent-color: #0d4d7b;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8rem;
      overflow-wrap: anywhere;
    }
    .empty {
      border: 1px dashed #c7d5e3;
      border-radius: 12px;
      padding: 14px;
      background: #f9fbfe;
      color: #3f4e5f;
    }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.82rem;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 720px) {
      .hero h1 { font-size: 1.15rem; }
      nav a { padding: 6px 10px; font-size: 0.84rem; }
      .card { padding: 12px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">DealSignal</a>
      <nav>
        <a href="/">Signals</a>
        <a href="/companies">Companies</a>
        <a href="/admin">Admin</a>
      </nav>
    </div>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
